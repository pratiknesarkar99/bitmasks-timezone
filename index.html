<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bit Masks: City Timezone Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <div class="container">
    <header>
      <h1>Bit Mask City Finder</h1>
      <p class="subtitle">Cities are matched to timezones using bitwise AND operations, no equality checks.</p>
    </header>

    <main>
      <section class="search-section">
        <label for="gmt-input">GMT Offset</label>
        <div class="search-row">
          <input type="number" id="gmt-input" placeholder="e.g. -4 or 5.5 or 5.75" min="-14" max="14" step="0.25" />
          <button id="find-btn">Find Cities</button>
        </div>
        <p class="hint">Use decimals for partial offsets: 5.5 = GMT+5:30, 5.75 = GMT+5:45</p>

        <div class="mode-group">
          <label class="radio-label">
            <input type="radio" name="search-mode" value="include" checked />
            In this timezone
          </label>
          <label class="radio-label">
            <input type="radio" name="search-mode" value="exclude" />
            Excluding this timezone
          </label>
        </div>
      </section>

      <section class="stats-section">
        <h2>Dataset</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="stat-total">--</span>
            <span class="stat-label">Total cities</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-offsets">--</span>
            <span class="stat-label">Unique offsets</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-range">--</span>
            <span class="stat-label">Offset range</span>
          </div>
          <div class="stat-card">
            <span class="stat-value" id="stat-largest">--</span>
            <span class="stat-label">Busiest offset</span>
          </div>
        </div>
      </section>

      <section class="results-section" id="results-section" hidden>
        <h2 id="results-heading">Results</h2>

        <div class="filter-section" id="filter-section" hidden>
          <p class="filter-label">Filter by timezone</p>
          <div class="pill-container" id="pill-container"></div>
          <button class="show-more-btn" id="show-more-btn" hidden>Show more</button>
        </div>

        <ul id="results-list" class="city-list results">
          <!-- populated by main.js -->
        </ul>
      </section>

      <p id="error-msg" class="error" hidden></p>
    </main>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>
